<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 討論室</title>
<script src="/vendor/phaser.min.js"></script>
<style>
/* ── Reset & Base ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --warm-cream: #f5e6c8;
  --warm-tan:   #d4a96a;
  --warm-wood:  #8b5e3c;
  --warm-dark:  #3d2b1f;
  --warm-bg:    #2a1f14;
  --accent:     #e8a030;
  --accent2:    #c86420;
  --text-light: #f0e0c0;
  --text-muted: #a08060;
  --ca:         #e07830;
  --cb:         #10b8a0;
  --cc:         #8060e8;
  --chair:      #ffe066;
  --ok:         #5bd45b;
  --err:        #ff5b5b;
}
html, body {
  width: 100%; height: 100%;
  background: var(--warm-bg);
  overflow: hidden;
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
  color: var(--text-light);
  touch-action: none;
}

/* ── Game canvas wrapper — fill entire viewport ── */
#game-wrap {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
#game-wrap canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* ── PIN overlay ── */
#pin-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--warm-bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1.2rem;
  padding: 2rem;
}
#pin-overlay.hidden { display: none; }
#pin-overlay h1 {
  font-size: 1.6rem; font-weight: 900;
  color: var(--accent); letter-spacing: 0.1em;
  text-shadow: 2px 2px 0 var(--warm-dark);
}
#pin-overlay p { color: var(--text-muted); font-size: 0.85rem; text-align: center; }
#pin-input-row { display: flex; gap: 0.5rem; }
#pinInput {
  background: var(--warm-dark);
  border: 2px solid var(--warm-tan);
  border-radius: 6px;
  color: var(--text-light);
  font-size: 1.4rem;
  letter-spacing: 0.4em;
  padding: 0.5rem 1rem;
  text-align: center;
  width: 140px;
  outline: none;
}
#pinInput:focus { border-color: var(--accent); }
#pinBtn {
  background: var(--accent);
  border: none; border-radius: 6px;
  color: var(--warm-dark); font-weight: 900;
  font-size: 1rem; padding: 0.5rem 1.2rem;
  cursor: pointer;
}
#pinBtn:hover { background: var(--accent2); color: #fff; }
#pin-err { color: var(--err); font-size: 0.8rem; min-height: 1em; }

/* ── Bottom sheet ── */
/* Dim backdrop, same visual language as #seats-panel (55% black fade).
   Driven purely by CSS :has() so the three openSheet call sites need no JS. */
#sheet-backdrop {
  position: fixed; inset: 0; z-index: 490;
  background: rgba(0,0,0,0.55);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
body:has(#sheet.open) #sheet-backdrop { opacity: 1; pointer-events: all; }
#sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
  background: var(--warm-dark);
  border-top: 3px solid var(--warm-tan);
  border-radius: 16px 16px 0 0;
  max-height: 70vh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.32,1,.36,1);
  box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
}
#sheet.open { transform: translateY(0); }

#sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.8rem 1rem 0.6rem;
  border-bottom: 1px solid var(--warm-wood);
  flex-shrink: 0;
}
#sheet-title {
  font-weight: 900; font-size: 1rem;
  color: var(--accent);
}
#sheet-close {
  background: transparent; border: none;
  color: var(--text-muted); font-size: 1.4rem;
  cursor: pointer; line-height: 1; padding: 0.1rem 0.3rem;
}
#sheet-close:hover { color: var(--text-light); }

#sheet-content {
  flex: 1; overflow-y: auto;
  padding: 0.8rem 1rem;
  display: flex; flex-direction: column; gap: 0.7rem;
}

/* ── Bubble messages ── */
.bubble {
  max-width: 88%; padding: 0.55rem 0.85rem;
  border-radius: 10px; font-size: 0.85rem; line-height: 1.6;
  word-break: break-word;
}
.bubble.user {
  background: var(--warm-wood);
  align-self: flex-end;
  border-bottom-right-radius: 3px;
}
.bubble.ai {
  background: #1e1410;
  border: 1px solid var(--warm-wood);
  align-self: flex-start;
  border-bottom-left-radius: 3px;
}
.bubble-label {
  font-size: 0.68rem; font-weight: 700; margin-bottom: 3px;
  opacity: 0.65;
}
.bubble.thinking {
  color: var(--text-muted); font-style: italic;
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Sheet input ── */
#sheet-input-row {
  display: flex; gap: 0.5rem; padding: 0.6rem 1rem 0.8rem;
  border-top: 1px solid var(--warm-wood);
  flex-shrink: 0;
}
#sheet-qa-row {
  padding: 0.6rem 1rem 0.8rem;
  border-top: 1px solid var(--warm-wood);
  flex-shrink: 0;
}
#fuInput {
  flex: 1;
  background: #1e1410; border: 1px solid var(--warm-wood);
  border-radius: 6px; color: var(--text-light);
  font-size: 0.88rem; padding: 0.45rem 0.7rem;
  resize: none; outline: none; height: 2.4rem;
}
#fuInput:focus { border-color: var(--accent); }
#fuBtn {
  background: var(--accent); border: none; border-radius: 6px;
  color: var(--warm-dark); font-weight: 900;
  font-size: 0.85rem; padding: 0 0.9rem; cursor: pointer;
}
#fuBtn:disabled { opacity: 0.4; cursor: default; }

/* ── Question input sheet (chair mode) ── */
#q-input-wrap {
  display: flex; gap: 0.5rem;
}
#qInput {
  flex: 1;
  background: #1e1410; border: 1px solid var(--warm-wood);
  border-radius: 6px; color: var(--text-light);
  font-size: 0.88rem; padding: 0.45rem 0.7rem;
  resize: none; outline: none; height: 2.4rem;
}
#qInput:focus { border-color: var(--accent); }
#submitBtn {
  background: var(--accent); border: none; border-radius: 6px;
  color: var(--warm-dark); font-weight: 900;
  font-size: 0.85rem; padding: 0 0.9rem; cursor: pointer;
  white-space: nowrap;
}
#submitBtn:disabled { opacity: 0.4; cursor: default; }
#resummarizeBtn {
  background: var(--warm-wood); border: none; border-radius: 6px;
  color: var(--text-light); font-weight: 700;
  font-size: 0.82rem; padding: 0.35rem 0.8rem; cursor: pointer;
  margin-top: 0.4rem;
}
#resummarizeBtn:disabled { opacity: 0.4; cursor: default; }

/* ── HUD ── */
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  pointer-events: none; z-index: 200;
  display: flex; justify-content: space-between;
  padding: 0.4rem 0.7rem;
  flex-wrap: wrap; gap: 0.2rem;
}
.hud-badge {
  font-size: 0.62rem; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; white-space: nowrap;
}
.hud-badge.running { background: #5b3a00; color: var(--accent); }
.hud-badge.done    { background: #0a3a0a; color: var(--ok); }
.hud-badge.error   { background: #3a0a0a; color: var(--err); }
.hud-badge.pending { background: var(--warm-dark); color: var(--text-muted); }
#hud-left { display: flex; gap: 0.3rem; align-items: center; flex-wrap: wrap; }
#hud-right { display: flex; gap: 0.3rem; align-items: center; }

/* ── Explore toggle button ── */
#exploreBtn {
  pointer-events: all;
  background: var(--warm-dark);
  border: 1.5px solid var(--warm-tan);
  border-radius: 5px;
  color: var(--text-muted);
  font-size: 0.62rem; font-weight: 700;
  padding: 2px 6px; cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s, color 0.2s;
}
#exploreBtn.active {
  background: #0a3a3a; color: #5be0e0;
  border-color: #5be0e0;
}
#explore-timer {
  font-size: 0.58rem; color: var(--text-muted);
  min-width: 2rem; text-align: right;
}

/* ── AI Legend ── */
#hud-legend {
  position: fixed; top: 2.2rem; left: 0; right: 0;
  pointer-events: none; z-index: 199;
  padding: 0.2rem 0.7rem;
  display: flex; gap: 0.5rem; flex-wrap: wrap;
}
.legend-item {
  font-size: 0.58rem; color: var(--text-muted);
  display: flex; align-items: center; gap: 2px;
}
.legend-dot {
  width: 7px; height: 7px; border-radius: 50%;
  display: inline-block;
}

#hud-hint {
  position: fixed; bottom: 0; left: 0; right: 0;
  pointer-events: none; z-index: 200;
  text-align: center; padding: 0.3rem;
  font-size: 0.62rem; color: var(--text-muted);
}

/* ── markdown rendered in bubbles ── */
.bubble h1,.bubble h2,.bubble h3 { font-size:0.9rem; margin-bottom:4px; color:var(--accent); }
.bubble p { margin-bottom:4px; }
.bubble ul,.bubble ol { padding-left:1.2em; margin-bottom:4px; }
.bubble strong { color:var(--warm-cream); }
.bubble code { background:#0a0806; padding:0 3px; border-radius:3px; font-size:0.8em; }
.bubble pre { background:#0a0806; padding:6px; border-radius:4px; overflow-x:auto; font-size:0.75em; margin:4px 0; }

/* ── Seat management panel ── */
#seats-panel {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
#seats-panel.open { opacity: 1; pointer-events: all; }
#seats-inner {
  width: 100%; max-height: 88vh;
  background: var(--warm-dark);
  border-top: 3px solid var(--warm-tan);
  border-radius: 16px 16px 0 0;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.32,1,.36,1);
  box-shadow: 0 -4px 24px rgba(0,0,0,0.6);
}
#seats-panel.open #seats-inner { transform: translateY(0); }

#seats-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.8rem 1rem 0.6rem;
  border-bottom: 1px solid var(--warm-wood);
  flex-shrink: 0;
}
#seats-title { font-weight: 900; font-size: 1rem; color: var(--accent); }
#seats-close {
  background: transparent; border: none;
  color: var(--text-muted); font-size: 1.4rem;
  cursor: pointer; line-height: 1; padding: 0.1rem 0.3rem;
}
#seats-close:hover { color: var(--text-light); }

#seats-scroll {
  flex: 1; overflow-y: auto;
  padding: 0.8rem 1rem;
  display: flex; flex-direction: column; gap: 0.6rem;
}

/* Seat card */
.seat-card {
  background: #1e1410;
  border: 1px solid var(--warm-wood);
  border-radius: 8px;
  padding: 0.6rem 0.8rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.seat-color-swatch {
  width: 16px; height: 16px; border-radius: 50%;
  flex-shrink: 0;
}
.seat-card-info { flex: 1; min-width: 0; }
.seat-card-name { font-size: 0.88rem; font-weight: 700; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.seat-card-sub  { font-size: 0.72rem; color: var(--text-muted); }
.seat-card-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
.seat-btn {
  background: var(--warm-wood); border: none; border-radius: 5px;
  color: var(--text-light); font-size: 0.72rem; font-weight: 700;
  padding: 3px 8px; cursor: pointer;
}
.seat-btn:hover { background: var(--accent); color: var(--warm-dark); }
.seat-btn.danger { background: #5a1a1a; color: #ff8888; }
.seat-btn.danger:hover { background: #ff5b5b; color: #fff; }
.seat-btn.test-btn { background: #1a3a2a; color: #5be0b0; }
.seat-btn.test-btn:hover { background: #2a6a4a; }
.seat-test-result { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; min-height: 1em; }

/* Seats bottom bar */
#seats-footer {
  display: flex; gap: 0.5rem; padding: 0.7rem 1rem 0.9rem;
  border-top: 1px solid var(--warm-wood);
  flex-shrink: 0; align-items: center;
}
#seats-add-btn {
  flex: 1;
  background: #1a3a1a; border: 1.5px dashed var(--ok);
  border-radius: 6px; color: var(--ok);
  font-size: 0.82rem; font-weight: 700;
  padding: 0.45rem 0; cursor: pointer;
  text-align: center;
}
#seats-add-btn:hover { background: #2a5a2a; }
#seats-save-btn {
  background: var(--accent); border: none; border-radius: 6px;
  color: var(--warm-dark); font-weight: 900;
  font-size: 0.85rem; padding: 0.45rem 1.2rem; cursor: pointer;
}
#seats-save-btn:disabled { opacity: 0.4; cursor: default; }
#seats-save-btn:not(:disabled):hover { background: var(--accent2); color: #fff; }
#seats-provider-note {
  font-size: 0.65rem; color: var(--text-muted);
  padding: 0 1rem 0.6rem; text-align: center; flex-shrink: 0;
}
#seats-provider-note a { color: var(--text-muted); text-decoration: underline dotted; }
#seats-err { font-size: 0.72rem; color: var(--err); padding: 0 1rem 0.4rem; display: none; }
#seats-ok  { font-size: 0.72rem; color: var(--ok);  padding: 0 1rem 0.4rem; display: none; }

/* Seat edit form (inline below card list) */
#seats-edit-form {
  background: #14100c;
  border: 1.5px solid var(--warm-tan);
  border-radius: 8px;
  padding: 0.8rem;
  display: none; flex-direction: column; gap: 0.55rem;
}
#seats-edit-form.open { display: flex; }
#seats-edit-form label { font-size: 0.72rem; color: var(--text-muted); display: block; margin-bottom: 2px; }
#seats-edit-form input, #seats-edit-form select, #seats-edit-form textarea {
  width: 100%;
  background: #1e1410; border: 1px solid var(--warm-wood);
  border-radius: 5px; color: var(--text-light);
  font-size: 0.82rem; padding: 0.35rem 0.55rem;
  outline: none;
}
#seats-edit-form input:focus, #seats-edit-form select:focus, #seats-edit-form textarea:focus {
  border-color: var(--accent);
}
#seats-edit-form textarea { resize: vertical; min-height: 4rem; font-family: inherit; }
#seats-edit-form select option { background: var(--warm-dark); }
.color-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
.color-preset {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  border: 2.5px solid transparent;
}
.color-preset.selected { border-color: #fff; }
.emblem-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
.emblem-preset {
  font-size: 0.72rem; padding: 2px 7px;
  background: var(--warm-dark); border: 1.5px solid var(--warm-wood);
  border-radius: 4px; cursor: pointer; color: var(--text-muted);
}
.emblem-preset.selected { border-color: var(--accent); color: var(--accent); }
.edit-form-actions { display: flex; gap: 0.4rem; margin-top: 0.3rem; }
.edit-form-actions button {
  flex: 1; border: none; border-radius: 5px;
  font-weight: 700; font-size: 0.82rem;
  padding: 0.4rem; cursor: pointer;
}
#seat-form-ok  { background: var(--accent); color: var(--warm-dark); }
#seat-form-ok:hover { background: var(--accent2); color: #fff; }
#seat-form-cancel { background: var(--warm-wood); color: var(--text-light); }
#seat-form-cancel:hover { background: #5a3a20; }

</style>
</head>
<body>

<!-- PIN Gate -->
<div id="pin-overlay">
  <h1>💬 AI 討論室</h1>
  <p>請輸入 6 位 PIN 碼以進入議事廳<br>（伺服器啟動時印在終端 / runs/pin.txt）</p>
  <div id="pin-input-row">
    <input id="pinInput" type="password" maxlength="6" inputmode="numeric" placeholder="000000" autocomplete="off">
    <button id="pinBtn" onclick="verifyPin()">進入</button>
  </div>
  <div id="pin-err"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-left">
    <span style="font-size:0.75rem; font-weight:900; color:var(--accent); margin-right:4px;">💬 AI 討論室</span>
    <!-- Member badges injected dynamically by renderHud() -->
  </div>
  <div id="hud-right">
    <span id="explore-timer"></span>
    <button id="langToggleBtn" onclick="toggleLang()" style="pointer-events:all;background:var(--warm-dark);border:1.5px solid var(--warm-tan);border-radius:5px;color:var(--text-muted);font-size:0.62rem;font-weight:700;padding:2px 6px;cursor:pointer;white-space:nowrap;">EN</button>
    <button id="exploreBtn" onclick="toggleExplore()">探索</button>
    <button id="seatsBtn" onclick="openSeatsPanel()" style="pointer-events:all;background:var(--warm-dark);border:1.5px solid var(--warm-tan);border-radius:5px;color:var(--text-muted);font-size:0.72rem;font-weight:700;padding:2px 6px;cursor:pointer;white-space:nowrap;">⚙</button>
    <span class="hud-badge pending" id="badgeChair">主席 待機</span>
  </div>
</div>
<!-- AI identity legend — shows after first session data arrives -->
<div id="hud-legend"></div>
<div id="hud-hint">點委員桌→深聊 ｜ 點講台→提問/總結 ｜ 點地板→移動 ｜ 探索→AI自由漫遊</div>

<!-- Game canvas -->
<div id="game-wrap"></div>

<!-- Seat management panel -->
<div id="seats-panel" onclick="handleSeatsPanelBgClick(event)">
  <div id="seats-inner">
    <div id="seats-header">
      <span id="seats-title">⚙ 席位管理</span>
      <button id="seats-close" onclick="closeSeatsPanel()">✕</button>
    </div>
    <div id="seats-scroll">
      <div id="seats-card-list"></div>
      <!-- Inline edit form -->
      <div id="seats-edit-form">
        <div>
          <label id="seat-form-name-lbl">顯示名稱</label>
          <input id="seat-form-name" type="text" maxlength="40" placeholder="Claude">
        </div>
        <div>
          <label id="seat-form-id-lbl">ID（唯一，英數-）</label>
          <input id="seat-form-id" type="text" maxlength="32" placeholder="claude">
        </div>
        <div>
          <label id="seat-form-adapter-lbl">Adapter</label>
          <select id="seat-form-adapter" onchange="onAdapterChange()">
            <option value="claude">claude</option>
            <option value="codex">codex</option>
            <option value="gemini">gemini</option>
            <option value="openai-compat">OpenAI-compatible API</option>
          </select>
        </div>
        <div>
          <label id="seat-form-modelarg-lbl">Model Arg（選填，e.g. gemini-2.5-flash）</label>
          <input id="seat-form-modelarg" type="text" placeholder="留空=使用預設">
        </div>
        <!-- openai-compat extra fields (shown/hidden by onAdapterChange) -->
        <div id="seat-compat-fields" style="display:none">
          <div>
            <label id="seat-form-baseurl-lbl">Base URL</label>
            <input id="seat-form-baseurl" type="text" maxlength="256" placeholder="http://localhost:11434/v1">
          </div>
          <div>
            <label id="seat-form-model-lbl">Model</label>
            <input id="seat-form-model" type="text" maxlength="64" placeholder="llama3">
          </div>
          <div>
            <label id="seat-form-apikeyenv-lbl">API Key Env（選填，環境變數名，留空=不送 Authorization）</label>
            <input id="seat-form-apikeyenv" type="text" maxlength="64" placeholder="DEEPSEEK_API_KEY">
          </div>
        </div>
        <div>
          <label id="seat-form-color-lbl">顏色</label>
          <div class="color-presets" id="seat-color-presets"></div>
        </div>
        <div>
          <label id="seat-form-emblem-lbl">徽章</label>
          <div class="emblem-presets" id="seat-emblem-presets"></div>
        </div>
        <div>
          <label id="seat-form-sp-lbl">System Prompt（選填，≤2000字）</label>
          <textarea id="seat-form-sp" maxlength="2000" rows="3"></textarea>
        </div>
        <div class="edit-form-actions">
          <button id="seat-form-ok" onclick="seatFormConfirm()">確認</button>
          <button id="seat-form-cancel" onclick="seatFormCancel()">取消</button>
        </div>
      </div>
    </div>
    <div id="seats-err"></div>
    <div id="seats-ok"></div>
    <div id="seats-provider-note">
      <span id="seats-provider-note-text">API 席位費用依供應商計費，使用者自負。</span><a href="#" id="seats-readme-link" onclick="return false">README</a>
    </div>
    <div id="seats-footer">
      <button id="seats-add-btn" onclick="seatAddNew()">＋ 新增席位</button>
      <button id="seats-save-btn" onclick="seatsSave()">儲存</button>
    </div>
  </div>
</div>

<!-- Bottom sheet -->
<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="sheet">
  <div id="sheet-header">
    <span id="sheet-title">委員 A</span>
    <button id="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div id="sheet-content" id="sheet-content"></div>
  <div id="sheet-input-row" style="display:none">

// Detect preferred language from localStorage or browser
function _detectLang() {
  const saved = localStorage.getItem('parliament_lang');
  if (saved === 'en' || saved === 'zh') return saved;
  const bl = (navigator.language || navigator.userLanguage || 'zh').toLowerCase();
  return bl.startsWith('zh') ? 'zh' : 'en';
}

let LANG = _detectLang();
function t(key, ...args) {
  const d = I18N[LANG];
  const v = d[key];
  if (typeof v === 'function') return v(...args);
  return v !== undefined ? v : (I18N['zh'][key] || key);
}

let PIN = localStorage.getItem('parliament_pin') || '';

// PIN GATE
// ═══════════════════════════════════════════════════════════════
function verifyPin() {
  const v = document.getElementById('pinInput').value.trim();
  if (!v) return;
  fetch(`/api/parliament/___probe`, {
    headers: { 'X-Parliament-Pin': v }
  }).then(r => {
    if (r.status === 401) {
      document.getElementById('pin-err').textContent = t('pinError');
    } else {
      PIN = v;
      localStorage.setItem('parliament_pin', PIN);
      document.getElementById('pin-overlay').classList.add('hidden');
      loadConfigMembers();
    }
  }).catch(() => {
    document.getElementById('pin-err').textContent = t('pinConnErr');
  });
}

// Load static member config to populate desks before any session starts
async function loadConfigMembers() {
  try {
    const { status, data } = await apiGet('/api/config');
    if (status !== 200 || !data.members) return;
    // Build a fake "session-like" members map so initMembers can reuse existing code
    const membersMap = {};
    for (const m of data.members) {
      membersMap[m.label] = {
        model_display: m.model_display,
        color: m.color,
        emblem: m.emblem,
        status: 'idle',
      };
    }
    if (gameScene) {
      gameScene.initMembers({ members: membersMap });
    } else {
      // Scene not ready yet — store and apply in scene create()
      window._pendingConfigMembers = { members: membersMap };
    }
  } catch (_) {}
}

window.addEventListener('DOMContentLoaded', () => {
  applyLang();
  if (PIN) {
    fetch('/api/parliament/___probe', { headers: { 'X-Parliament-Pin': PIN } })
      .then(r => {
        if (r.status !== 401) {
          document.getElementById('pin-overlay').classList.add('hidden');
          loadConfigMembers();
        } else {
          PIN = '';
          localStorage.removeItem('parliament_pin');
        }
      }).catch(() => {});
  }
  document.getElementById('pinInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') verifyPin();
  });
  document.getElementById('qInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitQuestion();
  });
});

// ═══════════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════════
function apiHeaders() {
  return { 'Content-Type': 'application/json', 'X-Parliament-Pin': PIN };
}
async function apiGet(path) {
  const r = await fetch(path, { headers: { 'X-Parliament-Pin': PIN } });
  return { status: r.status, data: await r.json() };
}
async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST', headers: apiHeaders(),
    body: JSON.stringify(body)
  });
  return { status: r.status, data: await r.json() };
}

// ═══════════════════════════════════════════════════════════════
// SUBMIT & POLL
// ═══════════════════════════════════════════════════════════════
async function submitQuestion() {
  const q = document.getElementById('qInput').value.trim();
  if (!q) return;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('resummarizeBtn').style.display = 'none';
  sessionId = null; sessionData = null; MEMBER_LABELS = [];
  setBadge('Chair','pending', t('chairBadge'));
  document.getElementById('hud-left').innerHTML =
    `<span style="font-size:0.75rem; font-weight:900; color:var(--accent); margin-right:4px;">${t('hudTitle')}</span>`;
  // Stop explore mode when debate begins
  if (exploreActive) _stopExplore();
  if (gameScene) gameScene.resetMemberStates();

  const { status, data } = await apiPost('/api/parliament', { question: q, lang: LANG });
  if (!data.session_id) { alert('Start failed'); document.getElementById('submitBtn').disabled=false; return; }
  sessionId = data.session_id;
  document.getElementById('qInput').value = '';
  startPolling();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollSession, 2000);
}

async function pollSession() {
  if (!sessionId) return;
  const { status, data } = await apiGet(`/api/parliament/${sessionId}`);
  if (status !== 200) return;
  sessionData = data;

  // Initialize member labels & colors from first data payload
  if (MEMBER_LABELS.length === 0 && data.members) {
    MEMBER_LABELS = Object.keys(data.members);
    MEMBER_COLORS = {};
    for (const [label, m] of Object.entries(data.members)) {
      MEMBER_COLORS[label] = m.color || '#888888';
    }
    renderHudStructure(data);
    if (gameScene) gameScene.initMembers(data);
  }

  renderHud(data);
  renderLegend(data);
  if (gameScene) gameScene.updateFromSession(data);
  if (sheetMode && sheetMode.startsWith('member-')) {
    refreshMemberSheet(sheetMode.replace('member-', ''));
  } else if (sheetMode === 'chair') {
    refreshChairSheet();
  }
  if (data.status === 'done' && data.chair_status === 'done') {
    clearInterval(pollTimer); pollTimer = null;
    document.getElementById('submitBtn').disabled = false;
    const rb = document.getElementById('resummarizeBtn');
    rb.disabled = false; rb.style.display = '';
  }
}

async function resummarize() {
  if (!sessionId) return;
  document.getElementById('resummarizeBtn').disabled = true;
  await apiPost(`/api/parliament/${sessionId}/summarize`, {});
  startPolling();
}

// ═══════════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════════
function setBadge(who, cls, text) {
  const el = document.getElementById(`badge${who}`);
  if (!el) return;
  el.className = `hud-badge ${cls}`;
  el.textContent = text;
}

function renderHudStructure(d) {
  // Build initial HUD badges for all members
  const left = document.getElementById('hud-left');
  left.innerHTML = `<span style="font-size:0.75rem; font-weight:900; color:var(--accent); margin-right:4px;">${t('hudTitle')}</span>`;
  for (const label of MEMBER_LABELS) {
    const span = document.createElement('span');
    span.id = `badge${label}`;
    span.className = 'hud-badge pending';
    span.textContent = t('memberBadgeWaiting', label);
    left.appendChild(span);
  }
}

function renderHud(d) {
  for (const label of MEMBER_LABELS) {
    const m = d.members[label];
    if (!m) continue;
    const md = m.model_display || '';
    if (m.status === 'done')       setBadge(label, 'done',    t('memberBadgeDone', label, md));
    else if (m.status === 'error') setBadge(label, 'error',   t('memberBadgeError', label));
    else                            setBadge(label, 'running', t('memberBadgeRunning', label));
  }
  if (d.chair_status === 'done')         setBadge('Chair','done',   t('chairDone'));
  else if (d.chair_status === 'running') setBadge('Chair','running',t('chairRunning'));
  else                                   setBadge('Chair','pending',t('chairBadge'));
}

function renderLegend(d) {
  const el = document.getElementById('hud-legend');
  if (!d || !d.members) { el.innerHTML = ''; return; }
  const items = MEMBER_LABELS.map(label => {
    const m = d.members[label];
    const color = m ? (m.color || '#888') : '#888';
    const md = m ? (m.model_display || label) : label;
    return `<span class="legend-item"><span class="legend-dot" style="background:${color}"></span>${label}=${md}</span>`;
  });
  el.innerHTML = items.join('');
}

// ═══════════════════════════════════════════════════════════════
// BOTTOM SHEET
// ═══════════════════════════════════════════════════════════════
function _memberDisplayName(label) {
  if (!sessionData || !sessionData.members || !sessionData.members[label]) return t('memberLabel', label);
  const md = sessionData.members[label].model_display;
  return t('memberLabelFull', label, md);
}

function openMemberSheet(label) {
  sheetMode = `member-${label}`;
  const color = MEMBER_COLORS[label] || '#fff';
  document.getElementById('sheet-title').textContent = _memberDisplayName(label);
  document.getElementById('sheet-title').style.color = color;
  document.getElementById('sheet-input-row').style.display = 'flex';
  document.getElementById('sheet-qa-row').style.display = 'none';
  document.getElementById('sheet').classList.add('open');
  refreshMemberSheet(label);
}

function openChairSheet() {
  sheetMode = 'chair';
  document.getElementById('sheet-title').textContent = t('sheetTitleChair');
  document.getElementById('sheet-title').style.color = '#ffe066';
  document.getElementById('sheet-input-row').style.display = 'none';
  document.getElementById('sheet-qa-row').style.display = 'block';
  const rb = document.getElementById('resummarizeBtn');
  rb.style.display = (sessionData && sessionData.status === 'done') ? '' : 'none';
  rb.disabled = !(sessionData && sessionData.status === 'done' && sessionData.chair_status === 'done');
  document.getElementById('sheet').classList.add('open');
  refreshChairSheet();
}

function closeSheet() {
  sheetMode = null;
  document.getElementById('sheet').classList.remove('open');
}

function refreshMemberSheet(label) {
  const content = document.getElementById('sheet-content');
  if (!sessionData) {
    content.innerHTML = `<div style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem">${t('noSessionMember')}</div>`;
    return;
  }
  const m = sessionData.members[label];
  const msgs = [];
  const memberName = _memberDisplayName(label);

  if (m && m.response) {
    msgs.push({ role:'user', text: sessionData.question });
    msgs.push({ role:'ai', text: m.response });
  } else if (m && m.status === 'running') {
    msgs.push({ role:'ai', text: t('memberThinking'), thinking: true });
  } else if (m && m.status === 'error') {
    msgs.push({ role:'ai', text: t('memberAbsent', m.error), error: true });
  } else {
    msgs.push({ role:'ai', text: t('memberWaiting'), thinking: true });
  }

  for (const f of (sessionData.followups || [])) {
    if (f.member !== label) continue;
    msgs.push({ role:'user', text: f.question });
    if (f.status === 'running') msgs.push({ role:'ai', text: '…思考中', thinking: true });
    else if (f.response) msgs.push({ role:'ai', text: f.response });
  }

  content.innerHTML = msgs.map(msg => {
    const cls = msg.role === 'user' ? 'user' : 'ai';
    const lbl = msg.role === 'user' ? t('youLabel') : memberName;
    const body = msg.thinking
      ? `<em class="bubble thinking">${escHtml(msg.text)}</em>`
      : mdToHtml(msg.text);
    return `<div class="bubble ${cls}"><div class="bubble-label">${lbl}</div>${body}</div>`;
  }).join('');
  content.scrollTop = content.scrollHeight;

  const hasPending = (sessionData.followups||[]).some(f=>f.member===label && f.status==='running');
  document.getElementById('fuBtn').disabled = hasPending || m.status !== 'done';
}

function _buildConclusionsTable(members, labels) {
  // Returns HTML for conclusions table; shown above chair summary.
  // All members must be done (or have conclusion data) before calling.
  if (!members || !labels || labels.length === 0) return '';
  let rows = '';
  for (const label of labels) {
    const m = members[label];
    if (!m) continue;
    const color = m.color || '#888';
    const modelName = m.model_display || label;
    const conclusionText = (m.conclusion != null)
      ? escHtml(m.conclusion)
      : `<em style="color:var(--text-muted)">${t('conclusionMissing')}</em>`;
    const memberCellLabel = LANG === 'en' ? `Member ${escHtml(label)}` : `委員${escHtml(label)}`;
    rows += `<tr>
      <td style="white-space:nowrap;padding:3px 8px 3px 4px;color:${color};font-weight:700;font-size:0.8rem">${memberCellLabel}</td>
      <td style="padding:3px 4px;font-size:0.75rem;color:var(--text-muted);white-space:nowrap">${escHtml(modelName)}</td>
      <td style="padding:3px 4px;font-size:0.82rem;line-height:1.5">${conclusionText}</td>
    </tr>`;
  }
  return `<div style="margin-bottom:0.6rem">
    <div style="font-size:0.72rem;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:0.04em">${t('conclusionTableTitle')}</div>
    <table style="width:100%;border-collapse:collapse;background:#1e1410;border-radius:6px;overflow:hidden">
      <thead><tr style="background:#2a1f14">
        <th style="padding:4px 8px 4px 4px;text-align:left;font-size:0.7rem;color:var(--text-muted);font-weight:600">${t('conclusionColMember')}</th>
        <th style="padding:4px;text-align:left;font-size:0.7rem;color:var(--text-muted);font-weight:600">${t('conclusionColModel')}</th>
        <th style="padding:4px;text-align:left;font-size:0.7rem;color:var(--text-muted);font-weight:600">${t('conclusionColStance')}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function refreshChairSheet() {
  const content = document.getElementById('sheet-content');
  if (!sessionData) {
    content.innerHTML = `<div style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem">${t('noSessionText')}</div>`;
    return;
  }
  let html = '';
  const allDone = sessionData.status === 'done';
  // Conclusions table: show once all members are done (chair may still be running)
  if (allDone && sessionData.members) {
    html += _buildConclusionsTable(sessionData.members, MEMBER_LABELS);
  }
  if (sessionData.chair_status === 'done' && sessionData.chair_summary) {
    // Decorate member label → member label(ModelName) in display only
    let summary = sessionData.chair_summary;
    if (sessionData.members) {
      for (const [label, m] of Object.entries(sessionData.members)) {
        if (m.model_display) {
          // Decorate both zh and en patterns to handle cross-lang scenarios
          const reZh = new RegExp(`委員${label}(?!（)`, 'g');
          summary = summary.replace(reZh, t('chairDecorate', label, m.model_display));
          const reEn = new RegExp(`Member ${label}(?! \\()`, 'g');
          summary = summary.replace(reEn, t('chairDecorate', label, m.model_display));
        }
      }
    }
    html += `<div class="bubble ai"><div class="bubble-label">${t('chairSummaryLabel')}</div>${mdToHtml(summary)}</div>`;
  } else if (sessionData.chair_status === 'running') {
    html += `<div class="bubble ai thinking"><div class="bubble-label">${t('sheetTitleChair')}</div>${t('chairRunningText')}</div>`;
  } else {
    html += `<div style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem">${t('waitingText')}</div>`;
  }
  content.innerHTML = html;
  content.scrollTop = content.scrollHeight;
}

async function sendFollowup() {
  if (!sheetMode || !sheetMode.startsWith('member-') || !sessionId) return;
  const label = sheetMode.replace('member-','');
  const q = document.getElementById('fuInput').value.trim();
  if (!q) return;
  document.getElementById('fuBtn').disabled = true;
  document.getElementById('fuInput').value = '';
  await apiPost(`/api/parliament/${sessionId}/followup`, { member: label, question: q });
  if (!pollTimer) startPolling();
}

// UTILS
// ═══════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function mdToHtml(md) {
  let s = escHtml(md);
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\n\n/g, '</p><p>');
  s = s.replace(/\n- /g, '</p><ul><li>').replace(/<\/li>\n- /g, '</li><li>');
  return '<p>' + s + '</p>';
}

// Parse hex color string to Phaser integer
function hexToInt(hex) {
  return parseInt(hex.replace('#',''), 16);
}

// ═══════════════════════════════════════════════════════════════
// EXPLORATION MODE
// ═══════════════════════════════════════════════════════════════
let exploreActive = false;
let exploreTimer = null;        // auto-off after 30 min
let exploreCountdown = 0;       // seconds remaining for auto-off
let exploreCountdownTimer = null;
let exploreMoveTimer = null;    // AI roaming tick
let exploreEncounterCooldown = 0; // frontend cooldown (seconds), refreshed from server 429
let exploreEncounterCooldownTimer = null;
let exploreEncounterBusy = false;
const EXPLORE_AUTO_OFF_SECS = 30 * 60; // 30 minutes
const EXPLORE_ENCOUNTER_FRONTEND_COOLDOWN = 30; // seconds between encounter attempts

// Ambient chat state
let _ambientChatTimer = null;       // setTimeout handle
let _ambientChatPaused = new Set(); // labels paused due to LLM encounter
const AMBIENT_CHAT_MIN_MS = 6000;
const AMBIENT_CHAT_MAX_MS = 12000;
const AMBIENT_BUBBLE_DURATION_MS = 3000;
const AMBIENT_MAX_ACTIVE = 2;       // max simultaneous ambient bubbles
let _ambientActiveCount = 0;

function _pickAmbientLine(text, labels) {
  // Replace {name} placeholder with a random other label
  if (!text.includes('{name}')) return text;
  const others = labels.filter(l => !text.startsWith(l));
  const pick = others[Math.floor(Math.random() * others.length)] || labels[0];
  return text.replace('{name}', pick);
}

function _scheduleAmbientChat() {
  if (_ambientChatTimer) { clearTimeout(_ambientChatTimer); _ambientChatTimer = null; }
  if (!exploreActive) return;
  const delay = AMBIENT_CHAT_MIN_MS + Math.random() * (AMBIENT_CHAT_MAX_MS - AMBIENT_CHAT_MIN_MS);
  _ambientChatTimer = setTimeout(_fireAmbientChat, delay);
}

function _fireAmbientChat() {
  _ambientChatTimer = null;
  if (!exploreActive || !gameScene) { return; }

  const corpus = AMBIENT_CORPUS[LANG] || AMBIENT_CORPUS['zh'];
  // Roaming labels = those NOT paused (by LLM encounter or debate)
  const available = (gameScene._memberLabels || []).filter(l => !_ambientChatPaused.has(l));
  if (available.length === 0) { _scheduleAmbientChat(); return; }

  // Try pair exchange if ≥2 available and we have budget
  if (available.length >= 2 && _ambientActiveCount + 2 <= AMBIENT_MAX_ACTIVE && corpus.pairs.length > 0) {
    // 30% chance of pair exchange
    if (Math.random() < 0.3) {
      const pair = corpus.pairs[Math.floor(Math.random() * corpus.pairs.length)];
      // Shuffle available; pick two
      const shuffled = available.slice().sort(() => Math.random() - 0.5);
      const labelA = shuffled[0], labelB = shuffled[1];
      _ambientActiveCount += 2;
      // Show A, then after a short gap show B
      const lineA = _pickAmbientLine(pair[0], available);
      const lineB = _pickAmbientLine(pair[1], available);
      gameScene.showAmbientBubble(labelA, lineA);
      setTimeout(() => {
        if (!exploreActive) return;
        gameScene.showAmbientBubble(labelB, lineB);
        setTimeout(() => {
          if (gameScene) { gameScene.clearAmbientBubble(labelB); }
          _ambientActiveCount = Math.max(0, _ambientActiveCount - 1);
        }, AMBIENT_BUBBLE_DURATION_MS);
      }, 1500);
      setTimeout(() => {
        if (gameScene) { gameScene.clearAmbientBubble(labelA); }
        _ambientActiveCount = Math.max(0, _ambientActiveCount - 1);
      }, AMBIENT_BUBBLE_DURATION_MS + 1500);
      _scheduleAmbientChat();
      return;
    }
  }

  // Solo utterance
  if (_ambientActiveCount >= AMBIENT_MAX_ACTIVE) { _scheduleAmbientChat(); return; }
  const label = available[Math.floor(Math.random() * available.length)];
  const line = corpus.single[Math.floor(Math.random() * corpus.single.length)];
  const text = _pickAmbientLine(line, available);
  _ambientActiveCount++;
  gameScene.showAmbientBubble(label, text);
  setTimeout(() => {
    if (gameScene) { gameScene.clearAmbientBubble(label); }
    _ambientActiveCount = Math.max(0, _ambientActiveCount - 1);
  }, AMBIENT_BUBBLE_DURATION_MS);

  _scheduleAmbientChat();
}

function _stopAmbientChat() {
  if (_ambientChatTimer) { clearTimeout(_ambientChatTimer); _ambientChatTimer = null; }
  _ambientChatPaused.clear();
  _ambientActiveCount = 0;
  if (gameScene) {
    for (const label of (gameScene._memberLabels || [])) {
      gameScene.clearAmbientBubble(label);
    }
  }
}

// Store last encounter exchange per pair for sheet display
let _lastEncounterData = null; // {exchange, topic, labelA, labelB}

function toggleExplore() {
  if (exploreActive) {
    _stopExplore();
  } else {
    _startExplore();
  }
}

function _startExplore() {
  if (!gameScene) return;
  exploreActive = true;
  exploreCountdown = EXPLORE_AUTO_OFF_SECS;
  document.getElementById('exploreBtn').classList.add('active');
  document.getElementById('exploreBtn').textContent = t('exploreBtnActive');
  gameScene.startExplore();
  // Kick off ambient chat
  _ambientActiveCount = 0;
  _ambientChatPaused.clear();
  _scheduleAmbientChat();
  // Auto-off countdown
  if (exploreCountdownTimer) clearInterval(exploreCountdownTimer);
  exploreCountdownTimer = setInterval(() => {
    exploreCountdown--;
    const m = Math.floor(exploreCountdown / 60);
    const s = String(exploreCountdown % 60).padStart(2, '0');
    const el = document.getElementById('explore-timer');
    if (el) el.textContent = `${m}:${s}`;
    if (exploreCountdown <= 0) {
      _stopExplore(true);
    }
  }, 1000);
}

function _stopExplore(auto = false) {
  exploreActive = false;
  _stopAmbientChat();
  if (exploreCountdownTimer) { clearInterval(exploreCountdownTimer); exploreCountdownTimer = null; }
  const btn = document.getElementById('exploreBtn');
  btn.classList.remove('active');
  btn.textContent = t('exploreBtn');
  const timerEl = document.getElementById('explore-timer');
  if (timerEl) timerEl.textContent = '';
  if (auto) {
    // Soft notification
    const hint = document.getElementById('hud-hint');
    if (hint) {
      const orig = hint.textContent;
      hint.textContent = t('exploreAutoOff');
      hint.style.color = 'var(--accent)';
      setTimeout(() => { hint.textContent = t('hintText'); hint.style.color = ''; }, 5000);
    }
  }
  if (gameScene) gameScene.stopExplore();
}

// Called from game when two members are adjacent
async function onMembersAdjacent(labelA, labelB) {
  if (!exploreActive || exploreEncounterBusy) return;
  if (exploreEncounterCooldown > 0) return;
  // Pause further encounters while this one runs
  exploreEncounterBusy = true;
  exploreEncounterCooldown = EXPLORE_ENCOUNTER_FRONTEND_COOLDOWN;
  // Pause ambient chat for these two during LLM encounter
  _ambientChatPaused.add(labelA);
  _ambientChatPaused.add(labelB);
  if (gameScene) { gameScene.clearAmbientBubble(labelA); gameScene.clearAmbientBubble(labelB); }
  // Start frontend cooldown tick
  if (exploreEncounterCooldownTimer) clearInterval(exploreEncounterCooldownTimer);
  exploreEncounterCooldownTimer = setInterval(() => {
    exploreEncounterCooldown = Math.max(0, exploreEncounterCooldown - 1);
    if (exploreEncounterCooldown <= 0) {
      clearInterval(exploreEncounterCooldownTimer);
      exploreEncounterCooldownTimer = null;
    }
  }, 1000);

  try {
    const { status, data } = await apiPost('/api/explore/encounter', { a: labelA, b: labelB });
    if (status === 429) {
      // Server-side cooldown — respect it
      const wait = data.wait_seconds || 60;
      exploreEncounterCooldown = Math.max(exploreEncounterCooldown, wait);
      return;
    }
    if (status !== 200 || !data.exchange || data.exchange.length === 0) return;

    _lastEncounterData = { exchange: data.exchange, topic: data.topic, labelA, labelB };

    // Show speech bubbles sequentially
    if (gameScene) {
      await gameScene.showEncounterBubbles(data.exchange, labelA, labelB);
    }
  } catch(e) {
    // network error — ignore
  } finally {
    exploreEncounterBusy = false;
    // Resume ambient chat for these members after encounter ends
    _ambientChatPaused.delete(labelA);
    _ambientChatPaused.delete(labelB);
  }
}

// Open sheet showing last encounter full text (called on sprite tap during explore)
function openEncounterSheet(label) {
  if (_lastEncounterData &&
      (_lastEncounterData.labelA === label || _lastEncounterData.labelB === label)) {
    const { exchange, topic } = _lastEncounterData;
    sheetMode = `encounter-${label}`;
    const color = MEMBER_COLORS[label] || '#fff';
    document.getElementById('sheet-title').textContent = t('encounterTitle', label);
    document.getElementById('sheet-title').style.color = color;
    document.getElementById('sheet-input-row').style.display = 'none';
    document.getElementById('sheet-qa-row').style.display = 'none';
    const content = document.getElementById('sheet-content');
    const topicHtml = `<div style="color:var(--text-muted);font-size:0.75rem;margin-bottom:8px">${t('encounterTopic', topic)}</div>`;
    const bubbles = exchange.map(turn => {
      const cls = turn.label === label ? 'user' : 'ai';
      const name = t('memberLabel', turn.label);
      return `<div class="bubble ${cls}"><div class="bubble-label">${escHtml(name)}</div><p>${escHtml(turn.text)}</p></div>`;
    }).join('');
    content.innerHTML = topicHtml + bubbles;
    content.scrollTop = 0;
    document.getElementById('sheet').classList.add('open');
  } else {
    // Fall through to normal member sheet
    openMemberSheet(label);
  }
}
